name: Grype Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      slack_webhook_secret:
        description: 'Secret name for Slack webhook (optional, for failure notifications)'
        required: false
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook URL for failure notifications'
        required: false

env:
  SCALA_VERSION: "2.12.18"

jobs:
  build:
    runs-on: ubuntu_32_core_128gb
    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install curl
        run: |
          apt-get update && apt-get install -y curl

      - name: Build Service JAR
        run: ./mill service\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Cloud GCP JAR
        run: ./mill cloud_gcp\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Cloud AWS JAR
        run: ./mill cloud_aws\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Cloud Azure JAR
        run: ./mill cloud_azure\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Flink jar
        run: ./mill flink\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Flink connectors jar
        run: ./mill flink_connectors.pubsub\[${{ env.SCALA_VERSION }}\].assembly

      - name: Prepare build artifacts
        run: |
          # Copy jars to build_output as docker build can't access the mill output directories directly
          mkdir -p build_output
          cp out/service/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/service_assembly_deploy.jar
          cp out/cloud_gcp/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/cloud_gcp_lib_deploy.jar
          cp out/cloud_aws/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/cloud_aws_lib_deploy.jar
          cp out/cloud_azure/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/cloud_azure_lib_deploy.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Fetcher Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/fetcher/Dockerfile
          platforms: linux/amd64
          push: false
          tags: chronon-fetcher:grype-test
          outputs: type=docker,dest=/tmp/chronon-fetcher.tar

      - name: Upload Service Assembly Jar
        uses: actions/upload-artifact@v4
        with:
          name: service-assembly-jar
          path: out/service/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud GCP Jar
        uses: actions/upload-artifact@v4
        with:
          name: cloud-gcp-jar
          path: out/cloud_gcp/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud AWS Jar
        uses: actions/upload-artifact@v4
        with:
          name: cloud-aws-jar
          path: out/cloud_aws/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud Azure Jar
        uses: actions/upload-artifact@v4
        with:
          name: cloud-azure-jar
          path: out/cloud_azure/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Flink Jar
        uses: actions/upload-artifact@v4
        with:
          name: flink-jar
          path: out/flink/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Flink connectors Jar
        uses: actions/upload-artifact@v4
        with:
          name: flink-connectors-jar
          path: out/flink_connectors/pubsub/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: chronon-fetcher-image
          path: /tmp/chronon-fetcher.tar

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: service
            artifact_name: service-assembly-jar
            scan_type: jar
            fail_on: low
          - artifact: cloud-gcp
            artifact_name: cloud-gcp-jar
            scan_type: jar
            fail_on: low
          - artifact: cloud-aws
            artifact_name: cloud-aws-jar
            scan_type: jar
            fail_on: low
          - artifact: cloud-azure
            artifact_name: cloud-azure-jar
            scan_type: jar
            fail_on: low
          - artifact: flink
            artifact_name: flink-jar
            scan_type: jar
            fail_on: low
          - artifact: flink-connectors
            artifact_name: flink-connectors-jar
            scan_type: jar
            fail_on: low
          - artifact: fetcher-image
            artifact_name: chronon-fetcher-image
            scan_type: docker
            fail_on: medium

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.scan_type == 'jar' && matrix.artifact_name || '.' }}

      - name: Install Grype
        run: |
          curl -sSfL https://get.anchore.io/grype | sh -s -- -b /usr/local/bin

      - name: Load Docker image
        if: matrix.scan_type == 'docker'
        run: docker load -i chronon-fetcher.tar

      - name: Run Grype scan on ${{ matrix.artifact }}
        run: |
          echo "Scanning ${{ matrix.artifact }} for vulnerabilities..."
          if [ "${{ matrix.scan_type }}" = "docker" ]; then
            grype --only-fixed --fail-on ${{ matrix.fail_on }} chronon-fetcher:grype-test
          else
            grype --only-fixed --fail-on ${{ matrix.fail_on }} ${{ matrix.artifact_name }}/out.jar
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [security_scan]
    if: ${{ failure() && inputs.slack_webhook_secret != '' }}

    steps:
      - name: On Fail Notify Slack
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Grype Security Scan Failed\n\n The security scan failed for commit <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.sha }}> on branch ${{ github.ref }}. Security vulnerabilities were detected. Please check the logs for more details.",
              "attachments": [
                {
                  "text": "",
                  "color": "#ff0000"
                }
              ]
            }
