name: Grype Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      slack_webhook_secret:
        description: 'Secret name for Slack webhook (optional, for failure notifications)'
        required: false
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook URL for failure notifications'
        required: false

env:
  SCALA_VERSION: "2.12.18"

jobs:
  build:
    runs-on: ubuntu_32_core_128gb
    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install curl
        run: |
          apt-get update && apt-get install -y curl

      - name: Build Service JAR
        run: ./mill service\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Cloud GCP JAR
        run: ./mill cloud_gcp\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Cloud AWS JAR
        run: ./mill cloud_aws\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Cloud Azure JAR
        run: ./mill cloud_azure\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Flink jar
        run: ./mill flink\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Flink connectors jar
        run: ./mill flink_connectors.pubsub\[${{ env.SCALA_VERSION }}\].assembly

      - name: Build Flink Kinesis connector jar
        run: ./mill flink_connectors.kinesis\[${{ env.SCALA_VERSION }}\].assembly

      - name: Prepare build artifacts
        run: |
          # Copy jars to build_output as docker build can't access the mill output directories directly
          mkdir -p build_output
          cp out/service/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/service_assembly_deploy.jar
          cp out/cloud_gcp/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/cloud_gcp_lib_deploy.jar
          cp out/cloud_aws/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/cloud_aws_lib_deploy.jar
          cp out/cloud_azure/${{ env.SCALA_VERSION }}/assembly.dest/out.jar build_output/cloud_azure_lib_deploy.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Fetcher Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/fetcher/Dockerfile
          platforms: linux/amd64
          push: false
          tags: chronon-fetcher:grype-test
          outputs: type=docker,dest=/tmp/chronon-fetcher.tar

      - name: Upload Service Assembly Jar
        uses: actions/upload-artifact@v4
        with:
          name: grype-service-assembly-jar
          path: out/service/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud GCP Jar
        uses: actions/upload-artifact@v4
        with:
          name: grype-cloud-gcp-jar
          path: out/cloud_gcp/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud AWS Jar
        uses: actions/upload-artifact@v4
        with:
          name: grype-cloud-aws-jar
          path: out/cloud_aws/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud Azure Jar
        uses: actions/upload-artifact@v4
        with:
          name: grype-cloud-azure-jar
          path: out/cloud_azure/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Flink Jar
        uses: actions/upload-artifact@v4
        with:
          name: grype-flink-jar
          path: out/flink/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Flink connectors Jar
        uses: actions/upload-artifact@v4
        with:
          name: grype-flink-connectors-jar
          path: out/flink_connectors/pubsub/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Flink Kinesis connector Jar
        uses: actions/upload-artifact@v4
        with:
          name: grype-flink-kinesis-connector-jar
          path: out/flink_connectors/kinesis/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: grype-chronon-fetcher-image
          path: /tmp/chronon-fetcher.tar

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: service
            artifact_name: grype-service-assembly-jar
            scan_type: jar
            fail_on: low
          - artifact: cloud-gcp
            artifact_name: grype-cloud-gcp-jar
            scan_type: jar
            fail_on: low
          - artifact: cloud-aws
            artifact_name: grype-cloud-aws-jar
            scan_type: jar
            fail_on: low
          - artifact: cloud-azure
            artifact_name: grype-cloud-azure-jar
            scan_type: jar
            fail_on: low
          - artifact: flink
            artifact_name: grype-flink-jar
            scan_type: jar
            fail_on: low
          - artifact: flink-connectors
            artifact_name: grype-flink-connectors-jar
            scan_type: jar
            fail_on: low
          - artifact: flink-kinesis-connector
            artifact_name: grype-flink-kinesis-connector-jar
            scan_type: jar
            fail_on: low
          - artifact: fetcher-image
            artifact_name: grype-chronon-fetcher-image
            scan_type: docker
            fail_on: medium

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.scan_type == 'jar' && matrix.artifact_name || '.' }}

      - name: Install Grype
        run: |
          curl -sSfL https://get.anchore.io/grype | sh -s -- -b /usr/local/bin

      - name: Load Docker image
        if: matrix.scan_type == 'docker'
        run: docker load -i chronon-fetcher.tar

      - name: Run Grype scan on ${{ matrix.artifact }}
        run: |
          echo "Scanning ${{ matrix.artifact }} for vulnerabilities..."
          if [ "${{ matrix.scan_type }}" = "docker" ]; then
            grype --only-fixed --fail-on ${{ matrix.fail_on }} chronon-fetcher:grype-test
          else
            grype --only-fixed --fail-on ${{ matrix.fail_on }} ${{ matrix.artifact_name }}/out.jar
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [security_scan]
    if: ${{ failure() && inputs.slack_webhook_secret != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Collect failed scan details
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find which scan steps failed in the current job
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq '[.jobs[] | select(.name | startswith("security_scan")) | select(.conclusion == "failure") | .name]' \
            > /tmp/failed-scans.json 2>/dev/null || echo "[]" > /tmp/failed-scans.json

      - name: Build notification payload
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          python3 << 'PYEOF' > /tmp/slack_payload.json
          import json, os

          run_url = os.environ['RUN_URL']
          sha = os.environ['COMMIT_SHA']
          branch = os.environ['BRANCH']

          # Load failed scan step names
          try:
              with open('/tmp/failed-scans.json') as f:
                  failed_scans = json.load(f)
          except Exception:
              failed_scans = []

          if failed_scans:
              scans_text = '\n'.join(f'• {s}' for s in failed_scans)
          else:
              scans_text = '• (could not determine failed scans)'

          blocks = [
              {
                  'type': 'section',
                  'text': {
                      'type': 'mrkdwn',
                      'text': f':warning: *Chronon Grype Security Scan Failed*\n\nCommit: <{run_url}|{sha[:8]}>\nBranch: `{branch}`'
                  }
              },
              {
                  'type': 'section',
                  'text': {
                      'type': 'mrkdwn',
                      'text': f'*Failed Scans:*\n{scans_text}'
                  }
              },
              {
                  'type': 'context',
                  'elements': [{
                      'type': 'mrkdwn',
                      'text': f'<{run_url}|View full logs>'
                  }]
              },
          ]

          payload = {
              'text': 'Chronon Grype Security Scan Failed',
              'blocks': blocks
          }

          print(json.dumps(payload))
          PYEOF

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack_payload.json
