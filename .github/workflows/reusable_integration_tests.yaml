                  cleaned.append(line)
              log_tail = '\n'.join(cleaned[-30:])
          except Exception:
              pass

          blocks = [
              {
                  'type': 'section',
                  'text': {
                      'type': 'mrkdwn',
                      'text': f':x: *Chronon Azure Integration Tests Failed*\n\nCommit: <{run_url}|{sha[:8]}>\nBranch: `{branch}`'
                  }
              },
          ]

          if log_tail:
              log_text = f'```\n{log_tail}\n```'
              if len(log_text) > 2900:
                  log_text = f'```\n...{log_tail[-2880:]}\n```'
              blocks.append({
                  'type': 'section',
                  'text': {
                      'type': 'mrkdwn',
