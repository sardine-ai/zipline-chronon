name: Push To Canary

on:
  push:
    branches:
      - main
  merge_group: # Trigger on merge groups to main branch
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  SCALA_VERSION: "2.12.18"
  AWS_ACCOUNT_ID: ${{secrets.AWS_ACCOUNT_ID}}
  AWS_REGION: ${{secrets.AWS_REGION}}
  GCP_PROJECT_ID: ${{secrets.GCP_PROJECT_ID}}
  GCP_REGION: ${{secrets.GCP_REGION}}

jobs:
  build_artifacts:
    runs-on: ubuntu_32_core_128gb
    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install curl
        run: |
          apt-get update && apt-get install -y curl

      - name: Get the latest release tag
        id: get_tag
        run: |
          git config --global --add safe.directory /__w/chronon/chronon
          git fetch --tags
          TAG=$(git tag --sort=-creatordate | head -n 1)
          TAG="${TAG#v}"
          if [ -z "$TAG" ]; then
            TAG="0.0.0"
          fi
          echo "Latest release tag: $TAG"

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Python Wheel
        id: build-wheel
        shell: bash
        env:
          VERSION: "${{ steps.get_tag.outputs.tag }}+${{ github.sha }}"
        run: |
          set -eo pipefail
          echo "Building wheel"
          CHRONON_VERSION=$VERSION ./mill python.wheel

          EXPECTED_ZIPLINE_WHEEL="out/python/wheel.dest/dist/zipline_ai-$VERSION-py3-none-any.whl"
          if [ ! -f "$EXPECTED_ZIPLINE_WHEEL" ]; then
            echo "$EXPECTED_ZIPLINE_WHEEL not found"
            exit 1
          fi
          echo "wheel_file=$EXPECTED_ZIPLINE_WHEEL" >> $GITHUB_OUTPUT
          echo "wheel_name=$(basename $EXPECTED_ZIPLINE_WHEEL)" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Wheel
        uses: actions/upload-artifact@v4
        with:
          name: zipline-ai-wheel
          path: ${{ steps.build-wheel.outputs.wheel_file }}


      - name: Build Mill Project
        id: mill-build
        run: |
          ./mill clean
          ./mill flink\[${{ env.SCALA_VERSION }}\].assembly
          ./mill cloud_gcp\[${{ env.SCALA_VERSION }}\].assembly
          ./mill cloud_aws\[${{ env.SCALA_VERSION }}\].assembly
          ./mill cloud_azure\[${{ env.SCALA_VERSION }}\].assembly
          ./mill service\[${{ env.SCALA_VERSION }}\].assembly
          ./mill flink_connectors.pubsub\[${{ env.SCALA_VERSION }}\].assembly

      - name: Upload Flink Assembly Jar
        uses: actions/upload-artifact@v4
        with:
          name: flink-assembly-jar
          path: out/flink/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud AWS Jar
        uses: actions/upload-artifact@v4
        with:
          name: cloud-aws-jar
          path: out/cloud_aws/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud GCP Jar
        uses: actions/upload-artifact@v4
        with:
          name: cloud-gcp-jar
          path: out/cloud_gcp/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Cloud Azure Jar
        uses: actions/upload-artifact@v4
        with:
          name: cloud-azure-jar
          path: out/cloud_azure/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload Service Assembly Jar
        uses: actions/upload-artifact@v4
        with:
          name: service-assembly-jar
          path: out/service/${{ env.SCALA_VERSION }}/assembly.dest/out.jar

      - name: Upload PubSub Jar
        uses: actions/upload-artifact@v4
        with:
          name: pubsub-jar
          path: out/flink_connectors/pubsub/${{ env.SCALA_VERSION }}/assembly.dest/out.jar
    outputs:
      wheel_file: ${{ steps.build-wheel.outputs.wheel_file }}
      wheel_name: ${{ steps.build-wheel.outputs.wheel_name }}
      version: ${{ steps.build-wheel.outputs.version }}


  push_to_aws:
    needs: build_artifacts
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:

      - name: Download Python Wheel
        uses: actions/download-artifact@v4
        with:
          name: zipline-ai-wheel

      - name: Download Flink Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: flink-assembly-jar
          path: flink-assembly-jar

      - name: Download Cloud AWS Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-aws-jar
          path: cloud-aws-jar

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Rename JAR files to expected names
        run: |
          # The artifacts are downloaded into directories named after the artifact
          # We need to move them to the current directory with the expected names
          mv flink-assembly-jar/out.jar flink_assembly_deploy.jar
          mv cloud-aws-jar/out.jar cloud_aws_lib_deploy.jar
          mv service-assembly-jar/out.jar service_assembly_deploy.jar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{env.AWS_ACCOUNT_ID}}:role/github_actions
          aws-region: ${{env.AWS_REGION}}

      - name: Push Jars to s3 Bucket
        shell: bash
        run: |
          set -eo pipefail
          aws s3 cp ${{ needs.build_artifacts.outputs.wheel_name }} s3://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/wheels/ --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp flink_assembly_deploy.jar s3://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/flink_assembly_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp cloud_aws_lib_deploy.jar s3://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/cloud_aws_lib_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp service_assembly_deploy.jar s3://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/service_assembly_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"


  push_to_gcp:
    needs: build_artifacts
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download Python Wheel
        uses: actions/download-artifact@v4
        with:
          name: zipline-ai-wheel

      - name: Download Flink Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: flink-assembly-jar
          path: flink-assembly-jar

      - name: Download Cloud GCP Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-gcp-jar
          path: cloud-gcp-jar

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Download PubSub Jar
        uses: actions/download-artifact@v4
        with:
          name: pubsub-jar
          path: pubsub-jar

      - name: Rename JAR files to expected names
        run: |
          # The artifacts are downloaded into directories named after the artifact
          # We need to move them to the current directory with the expected names
          mv flink-assembly-jar/out.jar flink_assembly_deploy.jar
          mv cloud-gcp-jar/out.jar cloud_gcp_lib_deploy.jar
          mv service-assembly-jar/out.jar service_assembly_deploy.jar
          mv pubsub-jar/out.jar connectors_pubsub_deploy.jar

      - name: Configure GCP Credentials
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{env.GCP_PROJECT_ID}}
          workload_identity_provider: projects/${{secrets.GCP_CANARY_PROJECT_NUMBER}}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions@${{secrets.GCP_CANARY_PROJECT_ID}}.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Push Jars to GCS Bucket
        shell: bash
        env:
          GAR_QUICKSTART_REPOSITORY: ${{env.GCP_REGION}}-docker.pkg.dev/${{env.GCP_PROJECT_ID}}/canary-images/quickstart
          IMAGE_TAG: main
        run: |
          set -eo pipefail
          gcloud storage cp ${{ needs.build_artifacts.outputs.wheel_name }} gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/wheels/
          gcloud storage objects update gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/wheels/${{ needs.build_artifacts.outputs.wheel_name }} --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp flink_assembly_deploy.jar gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/flink_assembly_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/flink_assembly_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp cloud_gcp_lib_deploy.jar gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/cloud_gcp_lib_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/cloud_gcp_lib_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp service_assembly_deploy.jar gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/service_assembly_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/service_assembly_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp connectors_pubsub_deploy.jar gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/connectors_pubsub_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/${{ needs.build_artifacts.outputs.version }}/jars/connectors_pubsub_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"


  push_to_azure:
    needs: build_artifacts
    runs-on: ubuntu-latest
    environment: main

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Python Wheel
        uses: actions/download-artifact@v4
        with:
          name: zipline-ai-wheel

      - name: Download Flink Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: flink-assembly-jar
          path: flink-assembly-jar

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Download Cloud Azure Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-azure-jar
          path: cloud-azure-jar

      - name: Rename JAR files to expected names
        run: |
          mv cloud-azure-jar/out.jar cloud_azure_lib_deploy.jar
          mv flink-assembly-jar/out.jar flink_assembly_deploy.jar
          mv service-assembly-jar/out.jar service_assembly_deploy.jar

      - name: Push Jars to Azure Blob Storage
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${{ needs.build_artifacts.outputs.version }}"
          ACCOUNT="ziplineai2"
          CONTAINER="dev-zipline-artifacts"
          
          az storage blob upload \
            --account-name $ACCOUNT \
            --auth-mode login \
            --container-name $CONTAINER \
            --file cloud_azure_lib_deploy.jar \
            --name release/${{ needs.build_artifacts.outputs.version }}/jars/cloud_azure_lib_deploy.jar \
            --tier cool \
            --overwrite
          
          az storage blob upload \
            --account-name $ACCOUNT \
            --auth-mode login \
            --container-name $CONTAINER \
            --file flink_assembly_deploy.jar \
            --name release/${{ needs.build_artifacts.outputs.version }}/jars/flink_assembly_deploy.jar \
            --tier cool \
            --overwrite
          
          az storage blob upload \
            --account-name $ACCOUNT \
            --auth-mode login \
            --container-name $CONTAINER \
            --file service_assembly_deploy.jar \
            --name release/${{ needs.build_artifacts.outputs.version }}/jars/service_assembly_deploy.jar \
            --tier cool \
            --overwrite
          
          az storage blob upload \
            --account-name $ACCOUNT \
            --auth-mode login \
            --container-name $CONTAINER \
            --file ${{ needs.build_artifacts.outputs.wheel_name }} \
            --name release/${{ needs.build_artifacts.outputs.version }}/wheels/${{ needs.build_artifacts.outputs.wheel_name }} \
            --tier cool \
            --overwrite

  run_aws_integration_tests:
    runs-on: ubuntu-latest
    needs: [ build_artifacts, push_to_aws ]

    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials for Canary Project
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{secrets.AWS_ACCOUNT_ID}}:role/github_actions
          aws-region: ${{secrets.AWS_REGION}}

      - name: Run Integration Tests
        shell: bash
        env:
          CLOUD: aws
          VERSION: ${{ needs.build_artifacts.outputs.version }}
          PYTEST_ADDOPTS: "-k test_run_quickstart"
        run: |
          set -xo pipefail
          ./mill python.test_integration

      - name: On Fail Notify Slack
        id: notify_slack
        if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_AWS_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Zipline AWS CI Tests Failed\n\n The integration tests failed for commit <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.sha }}> on branch ${{ github.ref }}. Please check the logs for more details.",
              "attachments": [
                {
                  "text": "",
                  "color": "#ff0000"
                }
              ]
            }

  run_fetcher_integration_tests:
    runs-on: ubuntu-latest
    needs: [ build_artifacts ]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 11

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # This should match the version used in [chronon]/.toolversions

      - name: Configure GCP Credentials for Canary Project
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{secrets.GCP_CANARY_PROJECT_ID}}
          workload_identity_provider: projects/${{secrets.GCP_CANARY_PROJECT_NUMBER}}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions@${{secrets.GCP_CANARY_PROJECT_ID}}.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Download Cloud GCP Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-gcp-jar
          path: cloud-gcp-jar

      - name: Download Cloud AWS Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-aws-jar
          path: cloud-aws-jar

      - name: Download Cloud Azure Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-azure-jar
          path: cloud-azure-jar

      - name: Copy the jars to expected paths and build
        shell: bash
        run: |
          mkdir build_output
          cp cloud-gcp-jar/out.jar build_output/cloud_gcp_lib_deploy.jar
          cp cloud-aws-jar/out.jar build_output/cloud_aws_lib_deploy.jar
          cp cloud-azure-jar/out.jar build_output/cloud_azure_lib_deploy.jar
          cp service-assembly-jar/out.jar build_output/service_assembly_deploy.jar
          docker buildx build \
          -f docker/fetcher/Dockerfile \
          -t ziplineai/chronon-fetcher:$(git rev-parse --short HEAD) \
          -t ziplineai/chronon-fetcher:latest \
          --load \
          .

      - name: Run docker detached
        shell: bash
        id: run_docker_detached
        run: |
          GCP_PROJECT_ID=canary-443022 GCP_BIGTABLE_INSTANCE_ID=zipline-canary-instance docker compose -f docker/fetcher/chronon-service-with-local-telemetry.yml up -d
          docker ps -a

      - name: Setup python
        shell: bash
        id: setup_python_venv
        run: |
          python3 -m venv fetcher_ci
          pip3 install -r scripts/fetcher_tests/requirements.txt

      - name: Run json string tests
        shell: bash
        id: run_json_string_tests
        run: |
          docker ps -a
          TEST_FAILED=false
          python3 scripts/fetcher_tests/json_string_test.py || TEST_FAILED=true
          if [ "$TEST_FAILED" = "true" ]; then
            echo "JSON string tests failed"
            docker logs chronon-service-chronon-fetcher-1             
            exit 1
          fi

      - name: Run fetcher integration tests
        shell: bash
        id: run_fetcher_integration_tests
        run: |
          docker ps -a
          TEST_FAILED=false
          python3 scripts/fetcher_tests/avro_encoded_string_test.py|| TEST_FAILED=true
          if [ "$TEST_FAILED" = "true" ]; then
            echo "Avro encoded string tests failed"
            docker logs chronon-service-chronon-fetcher-1               
            exit 1
          fi

  build_and_push_fetcher_image:
    needs: [build_artifacts, run_fetcher_integration_tests]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Cloud AWS Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-aws-jar
          path: cloud-aws-jar

      - name: Download Cloud GCP Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-gcp-jar
          path: cloud-gcp-jar

      - name: Download Cloud Azure Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-azure-jar
          path: cloud-azure-jar

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Copy JARs to build_output
        run: |
          mkdir -p build_output
          cp cloud-aws-jar/out.jar build_output/cloud_aws_lib_deploy.jar
          cp cloud-gcp-jar/out.jar build_output/cloud_gcp_lib_deploy.jar
          cp cloud-azure-jar/out.jar build_output/cloud_azure_lib_deploy.jar
          cp service-assembly-jar/out.jar build_output/service_assembly_deploy.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push fetcher image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/fetcher/Dockerfile
          push: true
          tags: |
            ziplineai/chronon-fetcher:${{ github.sha }}
            ziplineai/chronon-fetcher:nightly

  run_gcp_integration_tests:
    runs-on: ubuntu-latest
    needs: [ build_artifacts, push_to_gcp ]

    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure GCP Credentials for Canary Project
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{secrets.GCP_CANARY_PROJECT_ID}}
          workload_identity_provider: projects/${{secrets.GCP_CANARY_PROJECT_NUMBER}}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions@${{secrets.GCP_CANARY_PROJECT_ID}}.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Integration Tests
        shell: bash
        env:
          CLOUD: gcp
          VERSION: ${{ needs.build_artifacts.outputs.version }}
          PYTEST_ADDOPTS: "-k test_run_quickstart"
        run: |
          set -xo pipefail
          ./mill python.test_integration

      - name: On Fail Notify Slack
        id: notify_slack
        if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GCP_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Zipline GCP CI Tests Failed\n\n The integration tests failed for commit <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.sha }}> on branch ${{ github.ref }}. Please check the logs for more details.",
              "attachments": [
                {
                  "text": "",
                  "color": "#ff0000"
                }
              ]
            }

  push_to_aws_passing:
    needs: [ build_artifacts, run_gcp_integration_tests, run_aws_integration_tests, run_fetcher_integration_tests ]
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:

      - name: Download Python Wheel
        uses: actions/download-artifact@v4
        with:
          name: zipline-ai-wheel

      - name: Download Flink Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: flink-assembly-jar
          path: flink-assembly-jar

      - name: Download Cloud AWS Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-aws-jar
          path: cloud-aws-jar

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Rename JAR files to expected names
        run: |
          # The artifacts are downloaded into directories named after the artifact
          # We need to move them to the current directory with the expected names
          mv flink-assembly-jar/out.jar flink_assembly_deploy.jar
          mv cloud-aws-jar/out.jar cloud_aws_lib_deploy.jar
          mv service-assembly-jar/out.jar service_assembly_deploy.jar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{env.AWS_ACCOUNT_ID}}:role/github_actions
          aws-region: ${{env.AWS_REGION}}

      - name: Push Jars to s3 Bucket
        shell: bash
        run: |
          set -eo pipefail
          aws s3 cp ${{ needs.build_artifacts.outputs.wheel_name }} s3://zipline-artifacts-canary/release/passing-candidate/wheels/ --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp flink_assembly_deploy.jar s3://zipline-artifacts-canary/release/passing-candidate/jars/flink_assembly_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp cloud_aws_lib_deploy.jar s3://zipline-artifacts-canary/release/passing-candidate/jars/cloud_aws_lib_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp service_assembly_deploy.jar s3://zipline-artifacts-canary/release/passing-candidate/jars/service_assembly_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

      - name: Push Jars to s3 Bucket (latest)
        if: ${{ needs.run_aws_integration_tests.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -eo pipefail
          aws s3 cp ${{ needs.build_artifacts.outputs.wheel_name }} s3://zipline-artifacts-canary/release/latest/wheels/ --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp flink_assembly_deploy.jar s3://zipline-artifacts-canary/release/latest/jars/flink_assembly_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp cloud_aws_lib_deploy.jar s3://zipline-artifacts-canary/release/latest/jars/cloud_aws_lib_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"
          aws s3 cp service_assembly_deploy.jar s3://zipline-artifacts-canary/release/latest/jars/service_assembly_deploy.jar --metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"


  push_to_gcp_passing:
    needs: [ build_artifacts, run_gcp_integration_tests, run_aws_integration_tests, run_fetcher_integration_tests ]
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download Python Wheel
        uses: actions/download-artifact@v4
        with:
          name: zipline-ai-wheel

      - name: Download Flink Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: flink-assembly-jar
          path: flink-assembly-jar

      - name: Download Cloud GCP Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-gcp-jar
          path: cloud-gcp-jar

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Download PubSub Jar
        uses: actions/download-artifact@v4
        with:
          name: pubsub-jar
          path: pubsub-jar

      - name: Rename JAR files to expected names
        run: |
          # The artifacts are downloaded into directories named after the artifact
          # We need to move them to the current directory with the expected names
          mv flink-assembly-jar/out.jar flink_assembly_deploy.jar
          mv cloud-gcp-jar/out.jar cloud_gcp_lib_deploy.jar
          mv service-assembly-jar/out.jar service_assembly_deploy.jar
          mv pubsub-jar/out.jar connectors_pubsub_deploy.jar

      - name: Configure GCP Credentials
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{env.GCP_PROJECT_ID}}
          workload_identity_provider: projects/${{secrets.GCP_CANARY_PROJECT_NUMBER}}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions@${{secrets.GCP_CANARY_PROJECT_ID}}.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Push Jars to GCS Bucket
        shell: bash
        env:
          GAR_QUICKSTART_REPOSITORY: ${{env.GCP_REGION}}-docker.pkg.dev/${{env.GCP_PROJECT_ID}}/canary-images/quickstart
          IMAGE_TAG: main
        run: |
          set -eo pipefail
          gcloud storage cp ${{ needs.build_artifacts.outputs.wheel_name }} gs://zipline-artifacts-canary/release/passing-candidate/wheels/
          gcloud storage objects update gs://zipline-artifacts-canary/release/passing-candidate/wheels/${{ needs.build_artifacts.outputs.wheel_name }} --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp flink_assembly_deploy.jar gs://zipline-artifacts-canary/release/passing-candidate/jars/flink_assembly_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/passing-candidate/jars/flink_assembly_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp cloud_gcp_lib_deploy.jar gs://zipline-artifacts-canary/release/passing-candidate/jars/cloud_gcp_lib_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/passing-candidate/jars/cloud_gcp_lib_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp service_assembly_deploy.jar gs://zipline-artifacts-canary/release/passing-candidate/jars/service_assembly_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/passing-candidate/jars/service_assembly_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp connectors_pubsub_deploy.jar gs://zipline-artifacts-canary/release/passing-candidate/jars/connectors_pubsub_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/passing-candidate/jars/connectors_pubsub_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

      - name: Push Jars to GCS Bucket (latest)
        if: ${{ needs.run_gcp_integration_tests.result == 'success'  && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          GAR_QUICKSTART_REPOSITORY: ${{env.GCP_REGION}}-docker.pkg.dev/${{env.GCP_PROJECT_ID}}/canary-images/quickstart
          IMAGE_TAG: main
        run: |
          set -eo pipefail
          gcloud storage cp ${{ needs.build_artifacts.outputs.wheel_name }} gs://zipline-artifacts-canary/release/latest/wheels/
          gcloud storage objects update gs://zipline-artifacts-canary/release/latest/wheels/${{ needs.build_artifacts.outputs.wheel_name }} --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp flink_assembly_deploy.jar gs://zipline-artifacts-canary/release/latest/jars/flink_assembly_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/latest/jars/flink_assembly_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp cloud_gcp_lib_deploy.jar gs://zipline-artifacts-canary/release/latest/jars/cloud_gcp_lib_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/latest/jars/cloud_gcp_lib_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp service_assembly_deploy.jar gs://zipline-artifacts-canary/release/latest/jars/service_assembly_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/latest/jars/service_assembly_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"

          gcloud storage cp connectors_pubsub_deploy.jar gs://zipline-artifacts-canary/release/latest/jars/connectors_pubsub_deploy.jar
          gcloud storage objects update gs://zipline-artifacts-canary/release/latest/jars/connectors_pubsub_deploy.jar --custom-metadata="updated_date=$(date),commit=$(git rev-parse HEAD),branch=$(git rev-parse --abbrev-ref HEAD)"


  push_to_azure_passing:
    needs: [ build_artifacts, run_gcp_integration_tests, run_aws_integration_tests, run_fetcher_integration_tests ]
    runs-on: ubuntu-latest
    environment: main

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Python Wheel
        uses: actions/download-artifact@v4
        with:
          name: zipline-ai-wheel

      - name: Download Flink Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: flink-assembly-jar
          path: flink-assembly-jar

      - name: Download Service Assembly Jar
        uses: actions/download-artifact@v4
        with:
          name: service-assembly-jar
          path: service-assembly-jar

      - name: Download Cloud Azure Lib Jar
        uses: actions/download-artifact@v4
        with:
          name: cloud-azure-jar
          path: cloud-azure-jar

      - name: Rename JAR files to expected names
        run: |
          mv cloud-azure-jar/out.jar cloud_azure_lib_deploy.jar
          mv flink-assembly-jar/out.jar flink_assembly_deploy.jar
          mv service-assembly-jar/out.jar service_assembly_deploy.jar

      - name: Push Jars to Azure Blob Storage
        shell: bash
        run: |
            set -eo pipefail
            ACCOUNT="ziplineai2"
            CONTAINER="dev-zipline-artifacts"
            az storage blob upload \
              --account-name $ACCOUNT \
              --auth-mode login \
              --container-name $CONTAINER \
              --file cloud_azure_lib_deploy.jar \
              --name release/passing-candidate/jars/cloud_azure_lib_deploy.jar \
              --tier cool \
              --overwrite
            az storage blob upload \
                --account-name $ACCOUNT \
                --auth-mode login \
                --container-name $CONTAINER \
                --file flink_assembly_deploy.jar \
                --name release/passing-candidate/jars/flink_assembly_deploy.jar \
                --tier cool \
                --overwrite
            az storage blob upload \
                --account-name $ACCOUNT \
                --auth-mode login \
                --container-name $CONTAINER \
                --file service_assembly_deploy.jar \
                --name release/passing-candidate/jars/service_assembly_deploy.jar \
                --tier cool \
                --overwrite
            az storage blob upload \
                --account-name $ACCOUNT \
                --auth-mode login \
                --container-name $CONTAINER \
                --file ${{ needs.build_artifacts.outputs.wheel_name }} \
                --name release/passing-candidate/wheels/${{ needs.build_artifacts.outputs.wheel_name }} \
                --tier cool \
                --overwrite

      - name: Push Jars to Azure Blob Storage (latest)
        if: ${{ needs.run_aws_integration_tests.result == 'success' && needs.run_gcp_integration_tests.result == 'success'  && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
            set -eo pipefail
            ACCOUNT="ziplineai2"
            CONTAINER="dev-zipline-artifacts"
            az storage blob upload \
              --account-name $ACCOUNT \
              --auth-mode login \
              --container-name $CONTAINER \
              --file cloud_azure_lib_deploy.jar \
              --name release/latest/jars/cloud_azure_lib_deploy.jar \
              --tier cool \
              --overwrite
            az storage blob upload \
                --account-name $ACCOUNT \
                --auth-mode login \
                --container-name $CONTAINER \
                --file flink_assembly_deploy.jar \
                --name release/latest/jars/flink_assembly_deploy.jar \
                --tier cool \
                --overwrite
            az storage blob upload \
                --account-name $ACCOUNT \
                --auth-mode login \
                --container-name $CONTAINER \
                --file service_assembly_deploy.jar \
                --name release/latest/jars/service_assembly_deploy.jar \
                --tier cool \
                --overwrite
            az storage blob upload \
                --account-name $ACCOUNT \
                --auth-mode login \
                --container-name $CONTAINER \
                --file ${{ needs.build_artifacts.outputs.wheel_name }} \
                --name release/latest/wheels/${{ needs.build_artifacts.outputs.wheel_name }} \
                --tier cool \
                --overwrite

  clean_up_artifacts:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    needs: [ push_to_gcp_passing, push_to_aws_passing, push_to_azure_passing ]

    steps:
      - name: Delete Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            zipline-ai-wheel
            flink-assembly-jar
            cloud-aws-jar
            cloud-gcp-jar
            service-assembly-jar
            pubsub-jar

  merge_to_main-passing-tests:
    needs: [ run_fetcher_integration_tests, run_aws_integration_tests, run_gcp_integration_tests ]
    if: ${{ needs.run_aws_integration_tests.result == 'success' && needs.run_gcp_integration_tests.result == 'success'  && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          ssh-key: ${{ secrets.CHRONON_REPO_DEPLOY_KEY }}
      - name: Update Stable Branch
        env:
          TARGET_BRANCH: main-passing-tests
        run: |
          echo "Merging to main-passing-tests branch after successful push to canary"
          if git show-ref --quiet refs/heads/$TARGET_BRANCH; then
            echo "Target branch $TARGET_BRANCH exists. Merging main into it..."
            git checkout $TARGET_BRANCH
            git merge main --no-ff -m "Merge main into $TARGET_BRANCH"
          else
            echo "Target branch $TARGET_BRANCH does not exist. Creating it..."
            git checkout -b $TARGET_BRANCH main
          fi
          git push origin $TARGET_BRANCH

      - name: Create CI Status File
        run: |
          echo ${{ github.sha }} > ci_success.txt

      - name: Update CI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci_success
          path: ci_success.txt


  on_fail_notify_slack:
    needs: [ run_fetcher_integration_tests, run_aws_integration_tests, run_gcp_integration_tests, merge_to_main-passing-tests ]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Notification
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TESTS_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Zipline CI Tests Failed\n\n The integration tests failed for commit <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.sha }}> on branch ${{ github.ref }}. Please check the logs for more details.",
              "attachments": [
                {
                  "text": "",
                  "color": "#ff0000"
                }
              ]
            }